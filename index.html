<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Suzy</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px 16px;
  background: #fffaf5;
  color: #111;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  overflow: hidden;
  position: relative;
}

.card {
  width: 100%;
  max-width: 420px;
  background: rgba(255,255,255,0.78);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(255,182,213,0.6);
  border-radius: 28px;
  overflow: hidden;
  box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
  position: relative;
  z-index: 2;
}

.card::before {
  content: '';
  position: absolute;
  inset: 0;
  pointer-events: none;
  background: radial-gradient(circle at 30% 30%, rgba(255,45,149,0.09) 0%, transparent 60%),
              radial-gradient(circle at 70% 70%, rgba(255,45,149,0.09) 0%, transparent 60%);
  animation: softPulse 8s ease-in-out infinite;
  z-index: 1;
}

.card::after {
  content: "💕 ♡ 💖 ♡ 💗 💕 ♡ 💖 ♡ 💗";
  position: absolute;
  top: -25%;
  left: 0;
  width: 100%;
  height: 160%;
  font-size: 26px;
  color: #ff2d95;
  opacity: 0.22;
  pointer-events: none;
  z-index: 1;
  line-height: 1.9;
  animation: heartsFloat 35s linear infinite;
  white-space: pre-wrap;
}

@keyframes softPulse { 0%,100% { opacity: 0.9; } 50% { opacity: 1; } }
@keyframes heartsFloat { 0% { transform: translateY(0) rotate(0deg); } 100% { transform: translateY(-1700px) rotate(360deg); } }

.top-callout {
  position: absolute;
  top: -12px;
  right: -12px;
  z-index: 30;
  pointer-events: none;
}

.pulse-ring {
  width: 68px;
  height: 68px;
  background: transparent;
  border: 5px solid #ff2d95;
  border-radius: 50%;
  animation: pulseRing 1.6s infinite ease-in-out;
}
.pulse-ring::after {
  content: '';
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 24px; height: 24px;
  background: #ff2d95;
  border-radius: 50%;
  box-shadow: 0 0 18px #ff2d95;
}

.hero {
  height: 240px;
  overflow: hidden;
  position: relative;
}

.hero img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center 20%;
  display: block;
}

.content {
  padding: 24px;
  text-align: center;
  position: relative;
  z-index: 2;
}

.eyebrow {
  font-size: 12px;
  letter-spacing: 0.25em;
  color: #ff2d95;
  margin-bottom: 10px;
}

h1 {
  font-size: 32px;
  margin: 0 0 8px;
  line-height: 1.1;
}

.sub {
  color: rgba(0,0,0,0.65);
  margin-bottom: 20px;
  font-size: 23px;
  font-weight: 600;
}

.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-bottom: 24px;
}

.thumb {
  height: 92px;
  border-radius: 14px;
  overflow: hidden;
  border: 2px solid rgba(255,182,213,0.4);
  position: relative;
}

.thumb img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  filter: blur(0.8px) brightness(0.92);
}

.thumb::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(transparent, rgba(255,45,149,0.18));
}

.big-button {
  background: rgba(255,255,255,0.88);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  border: 1px solid rgba(255,182,213,0.7);
  color: #111;
  padding: 32px 24px;
  border-radius: 24px;
  font-weight: 700;
  font-size: 20px;
  box-shadow: 0 12px 35px -8px rgba(255,45,149,0.4);
  width: 100%;
  max-width: 320px;
  margin: 0 auto;
  display: block;
  text-align: center;
  line-height: 1.35;
  animation: pulseButton 1.8s infinite ease-in-out;
}

.big-button b {
  font-size: 26px;
  display: block;
  margin-bottom: 6px;
}

@keyframes pulseRing { 0%,100%{transform:scale(0.65);opacity:1}50%{transform:scale(1.15);opacity:0.75} }
@keyframes pulseButton { 0%,100%{transform:scale(1)}50%{transform:scale(1.04)} }
</style>
</head>

<body>

<div class="card">
  <div class="top-callout">
    <div class="pulse-ring"></div>
  </div>

  <div class="hero">
    <img src="hero.jpg.png" alt="Suzy">
  </div>

  <div class="content">

    <div class="eyebrow">private access only</div>
    <h1>you made it this far…</h1>
    <p class="sub">Suzy exclusive 💕</p>

    <div class="grid">
      <div class="thumb"><img src="preview-1.jpg.png" alt=""></div>
      <div class="thumb"><img src="preview-2.jpg.png" alt=""></div>
      <div class="thumb"><img src="preview-3.png" alt=""></div>
    </div>

    <div id="longPressBtn" class="big-button">
      <b>PRESS &amp; HOLD</b>
      TO SEE MORE 💕<br><br>
      <span style="font-size:15px;font-weight:600;">
        Android → Tap ⋯ top right<br>
        iPhone → Hold button 1 second
      </span>
    </div>

  </div>
</div>

<script>
// Simple long-press → always opens Linktree
const btn = document.getElementById('longPressBtn');
let pressTimer;

function startHold() {
  pressTimer = setTimeout(() => {
    window.location.href = "https://linktr.ee/Suzyxoxo";
  }, 900);   // hold for 0.9 seconds
}

function cancelHold() {
  clearTimeout(pressTimer);
}

btn.addEventListener('touchstart', startHold, { passive: true });
btn.addEventListener('touchend', cancelHold);
btn.addEventListener('touchcancel', cancelHold);
btn.addEventListener('mousedown', startHold);
btn.addEventListener('mouseup', cancelHold);
btn.addEventListener('mouseleave', cancelHold);
</script>

</body>
</html>
